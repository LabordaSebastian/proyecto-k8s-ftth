apiVersion: apps/v1
kind: Deployment
metadata:
  name: ftth-redis
  labels:
    app: ftth-redis
    tier: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ftth-redis
  template:
    metadata:
      labels:
        app: ftth-redis
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: role
                operator: In
                values:
                - database
      containers:
      - name: redis-cache
        image: redis:alpine
        ports:
        - containerPort: 6379
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
